    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 400px;
    animation: loginSlideIn 0.5s ease-out;
}

@keyframes loginSlideIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login-logo {
    text-align: center;
    margin-bottom: 30px;
}

.login-logo-icon {
    font-size: 60px;
    margin-bottom: 15px;
}

.login-logo h1 {
    margin: 0;
    color: #333;
    font-size: 24px;
    font-weight: 700;
}

.login-logo p {
    margin: 5px 0 0;
    color: #666;
    font-size: 14px;
}

.login-form-group {
    margin-bottom: 20px;
}

.login-form-group label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-size: 14px;
    font-weight: 500;
}

.login-form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s;
    box-sizing: border-box;
}

.login-form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

.login-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}

.login-btn:active {
    transform: translateY(0);
}

.login-error {
    background: #fef2f2;
    color: #dc2626;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
    border-left: 4px solid #dc2626;
}

.login-error.show {
    display: block;
    animation: shake 0.5s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}

.login-footer {
    text-align: center;
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
}

.login-footer p {
    margin: 0;
    color: #999;
    font-size: 12px;
}

/* Botón de cerrar sesión en la app */
.logout-btn {
    background: #ef4444;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
}

.logout-btn:hover {
    background: #dc2626;
}

/* Ocultar la app cuando no hay sesión */
.app-hidden {
    display: none !important;
}

/* Mostrar login cuando es necesario */
.login-visible {
    display: flex !important;
}
</style>
</head>
<body>
    
<!-- ============================================ -->
<!-- SISTEMA DE LOGIN -->
<!-- ============================================ -->
<div id="login-overlay" class="login-overlay">
    <div class="login-container">
        <div class="login-logo">
            <div class="login-logo-icon">🔐</div>
            <h1>Corporacion R.Z</h1>
            <p>Gestor de Claves y Mantenimientos</p>
        </div>

        <div id="login-error" class="login-error">
            Usuario o contraseña incorrectos
        </div>

        <form id="login-form">
            <div class="login-form-group">
                <label for="login-username">Usuario</label>
                <input 
                    type="text" 
                    id="login-username" 
                    name="username" 
                    placeholder="Ingrese su usuario"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="login-form-group">
                <label for="login-password">Contraseña</label>
                <input 
                    type="password" 
                    id="login-password" 
                    name="password" 
                    placeholder="Ingrese su contraseña"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="login-btn">
                Iniciar Sesión
            </button>
        </form>

        <div class="login-footer">
            <p>Sistema seguro - Acceso restringido</p>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ============================================
    // CONFIGURACIÓN DE USUARIOS
    // ============================================
    // Puedes modificar estos usuarios o agregar más
    var USUARIOS = [
        { username: 'admin', password: 'admin123', nombre: 'Administrador' },
        { username: 'usuario', password: 'usuario123', nombre: 'Usuario' }
    ];

    var SESSION_KEY = 'corporacion_rz_session';
    var SESSION_DURATION = 8 * 60 * 60 * 1000; // 8 horas en milisegundos

    // ============================================
    // FUNCIONES DE SESIÓN
    // ============================================

    function getSession() {
        try {
            var session = localStorage.getItem(SESSION_KEY);
            if (session) {
                return JSON.parse(session);
            }
        } catch(e) {}
        return null;
    }

    function setSession(user) {
        var session = {
            username: user.username,
            nombre: user.nombre,
            loginTime: Date.now(),
            expiresAt: Date.now() + SESSION_DURATION
        };
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    function clearSession() {
        localStorage.removeItem(SESSION_KEY);
    }

    function isSessionValid() {
        var session = getSession();
        if (!session) return false;
        if (Date.now() > session.expiresAt) {
            clearSession();
            return false;
        }
        return true;
    }

    // ============================================
    // FUNCIONES DE AUTENTICACIÓN
    // ============================================

    function autenticar(username, password) {
        for (var i = 0; i < USUARIOS.length; i++) {
            if (USUARIOS[i].username === username && USUARIOS[i].password === password) {
                return USUARIOS[i];
            }
        }
        return null;
    }

    function mostrarError(mensaje) {
        var errorDiv = document.getElementById('login-error');
        if (errorDiv) {
            errorDiv.textContent = mensaje || 'Usuario o contraseña incorrectos';
            errorDiv.classList.add('show');
            setTimeout(function() {
                errorDiv.classList.remove('show');
            }, 5000);
        }
    }

    function mostrarLogin() {
        var overlay = document.getElementById('login-overlay');
        var root = document.getElementById('root');
        if (overlay) overlay.style.display = 'flex';
        if (root) root.style.display = 'none';
    }

    function ocultarLogin() {
        var overlay = document.getElementById('login-overlay');
        var root = document.getElementById('root');
        if (overlay) overlay.style.display = 'none';
        if (root) root.style.display = 'block';
    }

    function loginExitoso(user) {
        setSession(user);
        ocultarLogin();
        agregarBotonLogout();
    }

    function logout() {
        clearSession();
        location.reload();
    }

    // ============================================
    // BOTÓN DE CERRAR SESIÓN
    // ============================================

    function agregarBotonLogout() {
        // Esperar a que la app cargue
        setTimeout(function() {
            var header = document.querySelector('header');
            if (!header) return;

            // Verificar si ya existe
            if (document.getElementById('btn-logout')) return;

            var session = getSession();
            if (!session) return;

            var btnLogout = document.createElement('button');
            btnLogout.id = 'btn-logout';
            btnLogout.className = 'logout-btn';
            btnLogout.innerHTML = '🚪 Cerrar Sesión';
            btnLogout.onclick = logout;

            // Insertar después de los botones de exportación o al final del header
            var exportContainer = document.getElementById('btn-excel');
            if (exportContainer && exportContainer.parentElement) {
                exportContainer.parentElement.appendChild(btnLogout);
            } else {
                header.appendChild(btnLogout);
            }

            // Agregar nombre de usuario
            var userInfo = document.createElement('span');
            userInfo.id = 'user-info';
            userInfo.style.cssText = 'color: white; font-size: 14px; margin-right: 15px;';
            userInfo.textContent = '👤 ' + session.nombre;

            if (btnLogout.parentElement) {
                btnLogout.parentElement.insertBefore(userInfo, btnLogout);
            }
        }, 1000);
    }

    // ============================================
    // INICIALIZACIÓN
    // ============================================

    function initAuth() {
        var loginForm = document.getElementById('login-form');
        var loginOverlay = document.getElementById('login-overlay');
        var rootDiv = document.getElementById('root');

        if (!loginForm || !loginOverlay || !rootDiv) {
            console.error('Elementos de login no encontrados');
            return;
        }

        // Verificar si hay sesión válida
        if (isSessionValid()) {
            ocultarLogin();
            agregarBotonLogout();
        } else {
            mostrarLogin();
        }

        // Manejar envío del formulario
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('login-username').value.trim();
            var password = document.getElementById('login-password').value;

            if (!username || !password) {
                mostrarError('Por favor ingrese usuario y contraseña');
                return;
            }

            var user = autenticar(username, password);

            if (user) {
                loginExitoso(user);
            } else {
                mostrarError('Usuario o contraseña incorrectos');
                document.getElementById('login-password').value = '';
            }
        });

        // Limpiar error al escribir
        var inputs = loginForm.querySelectorAll('input');
        inputs.forEach(function(input) {
            input.addEventListener('input', function() {
                var errorDiv = document.getElementById('login-error');
                if (errorDiv) errorDiv.classList.remove('show');
            });
        });
    }

    // Iniciar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initAuth);
    } else {
        initAuth();
    }

    // Exponer función logout globalmente
    window.logout = logout;
    window.checkSession = isSessionValid;
})();
</script>

<script>
(function() {
    // XLSX simplificado
    var XLSX = {
        utils: {
            aoa_to_sheet: function(data) {
                var sheet = {};
                data.forEach(function(row, R) {
                    row.forEach(function(cell, C) {
                        var cellRef = XLSX.utils.encode_cell({c: C, r: R});
                        sheet[cellRef] = {v: cell};
                    });
                });
                sheet['!ref'] = XLSX.utils.encode_range({s: {c: 0, r: 0}, e: {c: data[0].length - 1, r: data.length - 1}});
                return sheet;
            },
            encode_cell: function(cell) { return XLSX.utils.encode_col(cell.c) + XLSX.utils.encode_row(cell.r); },
            encode_col: function(col) { var s = ''; for (++col; col; col = Math.floor((col - 1) / 26)) s = String.fromCharCode((col - 1) % 26 + 65) + s; return s; },
            encode_row: function(row) { return '' + (row + 1); },
            encode_range: function(range) { return XLSX.utils.encode_cell(range.s) + ':' + XLSX.utils.encode_cell(range.e); },
            book_new: function() { return {SheetNames: [], Sheets: {}}; },
            book_append_sheet: function(wb, sheet, name) { wb.SheetNames.push(name); wb.Sheets[name] = sheet; }
        },
        write: function(wb) {
            var r = '<?xml version="1.0"?><workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet">';
            wb.SheetNames.forEach(function(name) {
                var s = wb.Sheets[name];
                r += '<worksheet name="' + name + '"><table>';
                var range = s['!ref'].split(':');
                var start = {r: 0, c: 0}, end = {r: 0, c: 0};
                var m1 = /^([A-Z]+)([0-9]+)$/.exec(range[0]);
                var m2 = /^([A-Z]+)([0-9]+)$/.exec(range[1]);
                if (m1) { start.c = XLSX.utils.decode_col(m1[1]); start.r = parseInt(m1[2]) - 1; }
                if (m2) { end.c = XLSX.utils.decode_col(m2[1]); end.r = parseInt(m2[2]) - 1; }
                for (var R = start.r; R <= end.r; ++R) {
                    r += '<row>';
                    for (var C = start.c; C <= end.c; ++C) {
                        var ref = XLSX.utils.encode_cell({c: C, r: R});
                        r += '<cell>' + ((s[ref] && s[ref].v) || '') + '</cell>';
                    }
                    r += '</row>';
                }
                r += '</table></worksheet>';
            });
            return r + '</workbook>';
        },
        writeFile: function(wb, filename) {
            var blob = new Blob([XLSX.write(wb)], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }
    };
    XLSX.utils.decode_col = function(col) { var c = 0; for (var i = 0; i < col.length; ++i) c = 26 * c + col.charCodeAt(i) - 64; return c - 1; };
    window.XLSX = XLSX;

    window.exportarAExcel = function(datos, nombre) {
        if (!datos || !datos.length) { alert('No hay datos'); return; }
        var wb = XLSX.utils.book_new(), ws = XLSX.utils.aoa_to_sheet(datos);
        XLSX.utils.book_append_sheet(wb, ws, "Datos");
        XLSX.writeFile(wb, nombre + ".xlsx");
    };

    window.exportarAWord = function(html, nombre) {
        if (!html) { alert('No hay contenido'); return; }
        var blob = new Blob(['\ufeff', '<html><head><meta charset="utf-8"></head><body>' + html + '</body></html>'], {type: 'application/msword'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = nombre + '.doc'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    };

    window.obtenerDatos = function() {
        var d = localStorage.getItem('corporacion_rz_data');
        try { return d ? JSON.parse(d) : null; } catch(e) { return null; }
    };

    function notif(titulo, msg, tipo) {
        var col = {urgente: '#ef4444', proximo: '#f59e0b', info: '#3b82f6'};
        var ico = {urgente: '⚠️', proximo: '⏰', info: 'ℹ️'};
        var n = document.createElement('div');
        n.style.cssText = 'position:fixed;top:20px;right:20px;background:' + col[tipo] + ';color:white;padding:16px 20px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.3);z-index:9999;max-width:350px;font-family:system-ui,sans-serif;animation:slideIn 0.3s;';
        n.innerHTML = '<div style="display:flex;gap:12px;align-items:flex-start;"><span style="font-size:24px;">' + ico[tipo] + '</span><div style="flex:1;"><div style="font-weight:600;">' + titulo + '</div><div style="font-size:14px;opacity:0.95;">' + msg + '</div></div><button onclick="this.parentElement.parentElement.remove()" style="background:rgba(255,255,255,0.2);border:none;color:white;width:24px;height:24px;border-radius:50%;cursor:pointer;">×</button></div>';
        document.body.appendChild(n);
        setTimeout(function() { n.remove(); }, 10000);
    }

    function verificar() {
        var d = window.obtenerDatos();
        if (!d || !d.mantenimientos) return;
        var hoy = new Date();
        d.mantenimientos.forEach(function(m) {
            var f = new Date(m.fecha || m.fechaRealizado);
            var prox = new Date(f); prox.setMonth(prox.getMonth() + 3);
            var diff = Math.floor((prox - hoy) / (1000 * 60 * 60 * 24));
            if (diff < 0) notif('¡Mantenimiento Vencido!', (m.equipo || m.nombre || 'Equipo') + ' - Vencido hace ' + Math.abs(diff) + ' días', 'urgente');
            else if (diff <= 7) notif('Mantenimiento Próximo', (m.equipo || m.nombre || 'Equipo') + ' - En ' + diff + ' días', 'proximo');
        });
    }

    var style = document.createElement('style');
    style.textContent = '@keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}';
    document.head.appendChild(style);

    function addButtons() {
        var h = document.querySelector('header');
        if (!h || document.getElementById('btn-excel')) return;
        var c = document.createElement('div'); c.style.cssText = 'display:flex;gap:8px;margin-left:auto;';
        var be = document.createElement('button'); be.id = 'btn-excel'; be.innerHTML = '📊 Excel'; be.style.cssText = 'background:#10b981;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:500;';
        be.onclick = function() {
            var d = window.obtenerDatos();
            if (!d) { alert('No hay datos'); return; }
            var data = [['Tipo', 'Nombre', 'Fecha', 'Detalles']];
            if (d.claves) d.claves.forEach(function(x) { data.push(['Clave', x.nombre || x.sitio || '', x.fecha || '', x.usuario || '']); });
            if (d.mantenimientos) d.mantenimientos.forEach(function(x) { data.push(['Mantenimiento', x.equipo || x.nombre || '', x.fecha || x.fechaRealizado || '', x.descripcion || x.tipo || '']); });
            if (d.visitas) d.visitas.forEach(function(x) { data.push(['Visita', x.sitio || x.nombre || '', x.fecha || '', x.tecnico || '']); });
            window.exportarAExcel(data, 'CorporacionRZ_' + new Date().toISOString().split('T')[0]);
        };
        var bw = document.createElement('button'); bw.id = 'btn-word'; bw.innerHTML = '📝 Word'; bw.style.cssText = 'background:#3b82f6;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:500;';
        bw.onclick = function() {
            var d = window.obtenerDatos();
            if (!d) { alert('No hay datos'); return; }
            var html = '<h1>Corporacion R.Z - Reporte</h1><p>' + new Date().toLocaleDateString() + '</p><hr/>';
            if (d.claves && d.claves.length) { html += '<h2>Claves</h2><table border="1" cellpadding="5"><tr><th>Nombre</th><th>Usuario</th><th>Fecha</th></tr>'; d.claves.forEach(function(x) { html += '<tr><td>' + (x.nombre || x.sitio || '') + '</td><td>' + (x.usuario || '') + '</td><td>' + (x.fecha || '') + '</td></tr>'; }); html += '</table><br/>'; }
            if (d.mantenimientos && d.mantenimientos.length) { html += '<h2>Mantenimientos</h2><table border="1" cellpadding="5"><tr><th>Equipo</th><th>Fecha</th><th>Descripción</th></tr>'; d.mantenimientos.forEach(function(x) { html += '<tr><td>' + (x.equipo || x.nombre || '') + '</td><td>' + (x.fecha || x.fechaRealizado || '') + '</td><td>' + (x.descripcion || x.tipo || '') + '</td></tr>'; }); html += '</table><br/>'; }
            if (d.visitas && d.visitas.length) { html += '<h2>Visitas</h2><table border="1" cellpadding="5"><tr><th>Sitio</th><th>Fecha</th><th>Técnico</th></tr>'; d.visitas.forEach(function(x) { html += '<tr><td>' + (x.sitio || x.nombre || '') + '</td><td>' + (x.fecha || '') + '</td><td>' + (x.tecnico || '') + '</td></tr>'; }); html += '</table>'; }
            window.exportarAWord(html, 'CorporacionRZ_' + new Date().toISOString().split('T')[0]);
        };
        c.appendChild(be); c.appendChild(bw); h.appendChild(c);
    }

    function addWidget() {
        if (document.getElementById('widget-rec')) return;
        var w = document.createElement('div'); w.id = 'widget-rec'; w.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9998;';
        var b = document.createElement('button'); b.innerHTML = '🔔 Recordatorios'; b.style.cssText = 'background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:12px 20px;border-radius:50px;cursor:pointer;font-weight:600;box-shadow:0 4px 15px rgba(102,126,234,0.4);';
        var p = document.createElement('div'); p.style.cssText = 'position:absolute;bottom:60px;right:0;width:320px;max-height:400px;background:white;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.2);overflow:hidden;display:none;';
        function upd() {
            var d = window.obtenerDatos(), m = d && d.mantenimientos ? d.mantenimientos : [], hoy = new Date();
            var html = '<div style="padding:16px;border-bottom:1px solid #e5e7eb;"><h3 style="margin:0;font-size:16px;">📅 Próximos Mantenimientos</h3></div>';
            if (!m.length) { html += '<div style="padding:20px;text-align:center;color:#6b7280;">No hay mantenimientos</div>'; }
            else {
                html += '<div style="max-height:300px;overflow-y:auto;">';
                m.forEach(function(x) {
                    var f = new Date(x.fecha || x.fechaRealizado), prox = new Date(f); prox.setMonth(prox.getMonth() + 3);
                    var diff = Math.ceil((prox - hoy) / (1000 * 60 * 60 * 24));
                    var col = diff < 0 ? '#ef4444' : (diff <= 7 ? '#f59e0b' : '#10b981');
                    var txt = diff < 0 ? 'Vencido hace ' + Math.abs(diff) + ' días' : (diff === 0 ? 'Hoy' : 'En ' + diff + ' días');
                    html += '<div style="padding:12px 16px;border-bottom:1px solid #f3f4f6;"><div style="font-weight:600;color:#374151;">' + (x.equipo || x.nombre || 'Equipo') + '</div><div style="font-size:12px;color:#6b7280;margin-top:4px;">Último: ' + f.toLocaleDateString() + '</div><div style="font-size:12px;color:' + col + ';font-weight:500;margin-top:4px;">' + txt + ' (' + prox.toLocaleDateString() + ')</div></div>';
                });
                html += '</div>';
            }
            p.innerHTML = html;
        }
        b.onclick = function() { if (p.style.display === 'none') { upd(); p.style.display = 'block'; } else { p.style.display = 'none'; } };
        w.appendChild(b); w.appendChild(p); document.body.appendChild(w);
    }

    function init() { addButtons(); addWidget(); setTimeout(verificar, 3000); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
    var i = 0, iv = setInterval(function() { addButtons(); addWidget(); i++; if (i > 15 || (document.getElementById('btn-excel') && document.getElementById('widget-rec'))) clearInterval(iv); }, 2000);
})();
</script>
